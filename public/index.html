<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="module" src="app.js"></script>
  <title>Mise en Place</title>
</head>

<body>
  <header>
    <h1>Mise en Place</h1>
  </header>

  <main>
    <div>
      <div id="chat-container"></div>

      <div>
        <input id="user-input" type="text" placeholder="Wat wil je koken?" autocomplete="off" />
        <button id="mic-btn">Spreek</button>
        <button id="send-btn">Stuur</button>
      </div>
    </div>

    <div>
      <div>
        <p>Recept</p>
        <div id="recept-panel">Nog geen recept — vraag de assistent!</div>
      </div>

      <div>
        <p>Boodschappenlijst</p>
        <div id="boodschappen-panel">Boodschappen verschijnen hier na het recept</div>
      </div>
    </div>
  </main>

  
</body>

</html>
